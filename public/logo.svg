<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 130" fill="none">
  <!-- Roof chevron - teal left side -->
  <path d="M28 68 L62 34 L78 48" stroke="#3BB8C9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Roof chevron - navy right side -->
  <path d="M62 34 L96 68" stroke="#1B3558" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Vertical pillar connecting roof to 'i' dot area -->
  <rect x="41" y="44" width="10" height="26" fill="#3BB8C9" rx="2"/>

  <!-- "intra" in dark navy, bold -->
  <text x="18" y="102" font-family="'Nunito Sans', 'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="58" fill="#1B2E4B" letter-spacing="-2">intra</text>

  <!-- "MORTGAGE" in teal, spaced -->
  <text x="80" y="124" font-family="'Nunito Sans', 'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="24" fill="#3BB8C9" letter-spacing="5">MORTGAGE</text>
</svg>
